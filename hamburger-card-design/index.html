<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hamburger-card-design</title>
    <!--font awesome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <!--google font Poppins-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;1,500;1,600&display=swap"
        rel="stylesheet">
    <!--css link-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="card-section">
        <div class="card-container">
            <div class="product-card">
                <span class="category-tag">
                    NEW
                </span>
                <img src="hamburger.png" alt="cheeseburger">
                <p class="brand">Burger House</p>
                <h3>Cheeseburger</h3>
                <div class="price">
                    <p><span class="discount">12%</span> $ 3 <del>$ 5.2</del></p>
                </div>
                <div class="add-cart">
                    <p>Add to Cart <i class="fa-solid fa-cart-shopping"></i></p>
                </div>
            </div>
            <div class="product-card">
                <span class="best-tag">
                    👍best
                </span>
                <img src="hamburger2.png" alt="Burger and chips">
                <p class="brand">Burger House</p>
                <h3>Burger & chips</h3>
                <div class="price">
                    <p><span class="discount">13%</span> $ 5 <del> $ 7.5</del></p>
                </div>
                <div class="add-cart">
                    <p>Add to Cart <i class="fa-solid fa-cart-shopping"></i></p>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
